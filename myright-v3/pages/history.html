<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>My Documents — MyRight</title>
  <link rel="manifest" href="../manifest.json"/>
  <meta name="theme-color" content="#080e1a"/>
  <link rel="apple-touch-icon" href="../icons/icon-192.png"/>
  <link rel="icon" href="../icons/favicon.ico"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
</head>
<body>

<div class="app-topbar"><button class="hamburger-btn" onclick="openSidebar()">☰</button><a href="../index.html" class="logo" style="gap:8px;"><div class="logo-icon" style="width:30px;height:30px;font-size:15px;">⚖️</div><span class="logo-text" style="font-size:18px;">MyRight</span></a><div style="width:38px;"></div></div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <a href="../index.html" class="logo">
        <div class="logo-icon">⚖️</div>
        <span class="logo-text">MyRight</span>
      </a>
    </div>
    <nav class="sidebar-nav">
      <a class="sidebar-item" href="dashboard.html"><span class="sidebar-icon">🏠</span> Dashboard</a>
      <a class="sidebar-item" href="generate.html"><span class="sidebar-icon">✨</span> Generate Document</a>
      <a class="sidebar-item active" href="history.html"><span class="sidebar-icon">📋</span> My Documents</a>
      <a class="sidebar-item" href="subscription.html"><span class="sidebar-icon">⭐</span> Subscription</a>
    </nav>
    <div class="sidebar-bottom">
      <a class="sidebar-item" href="profile.html"><span class="sidebar-icon">👤</span> Profile</a>
      <button class="sidebar-item" onclick="handleLogout()"><span class="sidebar-icon">🚪</span> Sign Out</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">📋 My Documents</h1>
      <p class="page-sub">All your generated legal documents</p>
    </div>

    <div class="gen-section" id="docsSection">
      <div id="docsContainer">
        <div style="text-align:center;padding:60px 20px;color:var(--text3);">
          <div style="font-size:44px;margin-bottom:12px;">⏳</div>
          <p>Loading your documents...</p>
        </div>
      </div>
    </div>

    <a href="generate.html" class="btn-primary" style="display:inline-flex;">✨ Generate New Document</a>
  </main>
</div>

<nav class="bottom-nav">
  <a class="bottom-nav-item" href="dashboard.html"><span class="bn-icon">🏠</span>Home</a>
  <a class="bottom-nav-item" href="generate.html"><span class="bn-icon">✨</span>Generate</a>
  <a class="bottom-nav-item active" href="history.html"><span class="bn-icon">📋</span>Docs</a>
  <a class="bottom-nav-item" href="subscription.html"><span class="bn-icon">⭐</span>Plans</a>
  <a class="bottom-nav-item" href="profile.html"><span class="bn-icon">👤</span>Profile</a>
</nav>

<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, collection, query, where, orderBy, getDocs, doc, getDoc, deleteDoc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAkq3f19TALpHQ89CoALb-4z18-Lz_Jndc",
    authDomain: "my-right-a4982.firebaseapp.com",
    projectId: "my-right-a4982",
    storageBucket: "my-right-a4982.firebasestorage.app",
    messagingSenderId: "522849413367",
    appId: "1:522849413367:web:ede20dd4876808da390bf2"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const DOC_NAMES = {
    rent_agreement:'Rent Agreement', nda:'NDA Agreement', partnership_deed:'Partnership Deed',
    employment_letter:'Offer Letter', freelance_agreement:'Freelance Agreement',
    legal_notice:'Legal Notice', affidavit:'Affidavit', poa:'Power of Attorney',
    sale_agreement:'Sale Agreement', leave_license:'Leave & License'
  };

  const DOC_ICONS = {
    rent_agreement:'🏠', nda:'🤝', partnership_deed:'🏢', employment_letter:'💼',
    freelance_agreement:'🖊️', legal_notice:'⚡', affidavit:'📜', poa:'✍️',
    sale_agreement:'🚗', leave_license:'🏗️'
  };

  const isGuest = localStorage.getItem('mr_guest') === '1';

  if (isGuest) {
    document.getElementById('docsContainer').innerHTML = `
      <div style="text-align:center;padding:60px 20px;color:var(--text3);">
        <div style="font-size:44px;margin-bottom:12px;">🔒</div>
        <p style="margin-bottom:6px;font-size:16px;color:var(--text2);">Document history requires an account</p>
        <p style="font-size:13px;margin-bottom:20px;">Create a free account to save and access all your documents.</p>
        <a href="signup.html" class="btn-primary" style="display:inline-flex;">Create Free Account →</a>
      </div>`;
  } else {
    onAuthStateChanged(auth, async user => {
      if (!user) { window.location.href = 'login.html'; return; }

      try {
        const q = query(
          collection(db, 'documents'),
          where('userId', '==', user.uid),
          orderBy('createdAt', 'desc')
        );
        const snap = await getDocs(q);

        if (snap.empty) {
          document.getElementById('docsContainer').innerHTML = `
            <div style="text-align:center;padding:60px 20px;color:var(--text3);">
              <div style="font-size:44px;margin-bottom:12px;">📄</div>
              <p style="margin-bottom:16px;">No documents yet. Generate your first one!</p>
              <a href="generate.html" class="btn-primary" style="display:inline-flex;">Generate Document →</a>
            </div>`;
          return;
        }

        window._allDocs = {};
        snap.docs.forEach(d => { window._allDocs[d.id] = d.data(); });

        const rows = snap.docs.map(d => {
          const data = d.data();
          const date = data.createdAt?.toDate().toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'}) || '—';
          return `<tr>
            <td><span style="font-size:18px;margin-right:8px;">${DOC_ICONS[data.docType]||'📄'}</span>${DOC_NAMES[data.docType]||data.docType}</td>
            <td style="color:var(--text3);white-space:nowrap;">${date}</td>
            <td><span class="badge badge-success">✓ Generated</span></td>
            <td style="white-space:nowrap;">
              <button onclick="downloadDoc('${d.id}')" style="background:var(--gold-dim);border:1px solid var(--gold);color:var(--gold);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:Outfit,sans-serif;font-weight:600;margin-right:6px;">⬇ PDF</button>
              <button onclick="previewDoc('${d.id}')" style="background:var(--surface2);border:1px solid var(--border2);color:var(--text2);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:Outfit,sans-serif;">👁 View</button>
            </td>
          </tr>`;
        }).join('');

        document.getElementById('docsContainer').innerHTML = `
          <div style="margin-bottom:16px;font-size:13px;color:var(--text3);">${snap.docs.length} document${snap.docs.length !== 1 ? 's' : ''} total</div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Document</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      } catch(e) {
        console.error(e);
        document.getElementById('docsContainer').innerHTML = `
          <div style="text-align:center;padding:40px;color:var(--text3);">
            <p>Failed to load documents. Please refresh the page.</p>
          </div>`;
      }
    });
  }

  window.downloadDoc = (id) => {
    const data = window._allDocs?.[id];
    if (!data) return;
    const name = DOC_NAMES[data.docType] || 'Document';
    const win = window.open('', '_blank');
    if (!win) { showToast('⚠️ Allow pop-ups to download'); return; }
    win.document.write(`<!DOCTYPE html><html><head><title>${name}</title>
    <style>body{font-family:Georgia,serif;padding:60px;line-height:1.9;color:#1a1a1a;font-size:13px;max-width:800px;margin:0 auto}
    .hdr{text-align:center;border-bottom:2px solid #111;padding-bottom:18px;margin-bottom:28px}
    pre{white-space:pre-wrap;font-family:Georgia,serif}
    .ftr{border-top:1px solid #ccc;margin-top:40px;padding-top:12px;font-size:10px;color:#777;text-align:center}
    @media print{@page{margin:1in}}</style></head>
    <body><div class="hdr"><div style="font-size:22px;font-weight:bold">⚖️ MyRight</div>
    <div style="font-size:11px;color:#555;margin-top:4px">Know Your Rights. Own Your Documents. | myright.app</div></div>
    <pre>${data.content.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>
    <div class="ftr">This document is a template. Consult a lawyer for complex matters. | Generated by MyRight</div>
    </body></html>`);
    win.document.close();
    setTimeout(() => win.print(), 500);
  };

  window.previewDoc = (id) => {
    const data = window._allDocs?.[id];
    if (!data) return;
    sessionStorage.setItem('previewDoc', JSON.stringify({id, ...data}));
    const name = DOC_NAMES[data.docType] || 'Document';
    const win = window.open('', '_blank');
    if (!win) { showToast('⚠️ Allow pop-ups to preview'); return; }
    win.document.write(`<!DOCTYPE html><html><head><title>${name} — Preview</title>
    <style>body{font-family:Georgia,serif;padding:40px;line-height:1.9;color:#1a1a1a;font-size:13px;max-width:800px;margin:0 auto;background:#fafafa}
    h1{font-size:18px;border-bottom:1px solid #ddd;padding-bottom:12px;margin-bottom:20px}
    pre{white-space:pre-wrap;background:#fff;padding:32px;border-radius:8px;border:1px solid #e5e5e5}
    .btn{display:inline-block;background:#d4a843;color:#fff;padding:10px 20px;border-radius:6px;font-weight:600;cursor:pointer;border:none;font-family:Georgia,serif;margin-bottom:20px}
    </style></head>
    <body>
    <h1>⚖️ ${name} — Preview</h1>
    <button class="btn" onclick="window.print()">🖨 Print / Save as PDF</button>
    <pre>${data.content.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>
    </body></html>`);
    win.document.close();
  };

  window.handleLogout = async () => {
    localStorage.removeItem('mr_guest');
    try { await signOut(auth); } catch(e) {}
    window.location.href = '../index.html';
  };

  window.openSidebar = () => {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('show');
  };

  window.closeSidebar = () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>

</body>
</html>
