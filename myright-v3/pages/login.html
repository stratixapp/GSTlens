<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Sign In — MyRight</title>
  <link rel="manifest" href="../manifest.json"/>
  <meta name="theme-color" content="#080e1a"/>
  <link rel="apple-touch-icon" href="../icons/icon-192.png"/>
  <link rel="icon" href="../icons/favicon.ico"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
</head>
<body>

<div class="auth-page">
  <div class="auth-bg">
    <div class="hero-orb orb1"></div>
    <div class="hero-orb orb2"></div>
    <div class="hero-grid"></div>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <a href="../index.html" class="logo" style="justify-content:center;">
        <div class="logo-icon">⚖️</div>
        <span class="logo-text">MyRight</span>
      </a>
      <span class="auth-tagline">Know Your Rights. Own Your Documents.</span>
    </div>

    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-sub">Sign in to access your legal documents</p>

    <div class="form-error" id="errorMsg"></div>

    <button class="btn-google" id="googleBtn" onclick="handleGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <button class="skip-btn" onclick="handleSkip()">
      👤 Continue as Guest (no account needed)
    </button>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Create one free</a>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <span id="toastMsg"></span>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth,
    signInWithPopup,
    GoogleAuthProvider,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore,
    doc, getDoc, setDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAkq3f19TALpHQ89CoALb-4z18-Lz_Jndc",
    authDomain: "my-right-a4982.firebaseapp.com",
    projectId: "my-right-a4982",
    storageBucket: "my-right-a4982.firebasestorage.app",
    messagingSenderId: "522849413367",
    appId: "1:522849413367:web:ede20dd4876808da390bf2"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();
  provider.addScope('profile');
  provider.addScope('email');

  // If already logged in, redirect
  onAuthStateChanged(auth, user => {
    if (user) {
      localStorage.removeItem('mr_guest');
      window.location.href = 'dashboard.html';
    }
  });

  window.handleGoogle = async () => {
    const btn = document.getElementById('googleBtn');
    btn.disabled = true;
    btn.textContent = 'Opening Google...';
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      // Create Firestore user doc if new
      const userRef = doc(db, 'users', user.uid);
      const snap = await getDoc(userRef);
      if (!snap.exists()) {
        await setDoc(userRef, {
          name: user.displayName || 'User',
          email: user.email,
          plan: 'free',
          docsGenerated: 0,
          createdAt: serverTimestamp()
        });
      }
      localStorage.removeItem('mr_guest');
      showToast('✅ Signed in with Google!');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    } catch (e) {
      btn.disabled = false;
      btn.innerHTML = `<svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Continue with Google`;
      if (e.code !== 'auth/popup-closed-by-user') showErr(getErr(e.code));
    }
  };

  window.handleSkip = () => {
    localStorage.setItem('mr_guest', '1');
    window.location.href = 'dashboard.html';
  };

  function showErr(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 5000);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function getErr(code) {
    const m = {
      'auth/popup-blocked': 'Popup was blocked. Please allow popups for this site.',
      'auth/account-exists-with-different-credential': 'Account already exists with a different method.',
      'auth/network-request-failed': 'Network error. Check your connection.',
      'auth/too-many-requests': 'Too many attempts. Please try later.',
      'auth/user-disabled': 'This account has been disabled.'
    };
    return m[code] || 'Sign in failed. Please try again.';
  }
</script>

</body>
</html>
