<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Forgot Password — MyRight</title>
  <link rel="manifest" href="../manifest.json"/>
  <meta name="theme-color" content="#080e1a"/>
  <link rel="apple-touch-icon" href="../icons/icon-192.png"/>
  <link rel="icon" href="../icons/favicon.ico"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
</head>
<body>

<div class="auth-page">
  <div class="auth-bg">
    <div class="hero-orb orb1"></div>
    <div class="hero-orb orb2"></div>
    <div class="hero-grid"></div>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <a href="../index.html" class="logo" style="justify-content:center;">
        <div class="logo-icon">⚖️</div>
        <span class="logo-text">MyRight</span>
      </a>
    </div>

    <!-- Step 1: Enter email -->
    <div id="step1">
      <h2 class="auth-title">Forgot Password?</h2>
      <p class="auth-sub">Enter your email and we'll send a reset link instantly.</p>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-error" id="errorMsg"></div>
      <button class="btn-gold btn-full" id="resetBtn" onclick="sendReset()">Send Reset Link →</button>
      <div class="auth-footer" style="margin-top:20px;">
        <a href="login.html" style="color:var(--text3);text-decoration:none;">← Back to Sign In</a>
      </div>
    </div>

    <!-- Step 2: Confirmation -->
    <div id="step2" style="display:none;text-align:center;">
      <div style="font-size:56px;margin-bottom:20px;">📧</div>
      <h2 class="auth-title">Check Your Email</h2>
      <p class="auth-sub" style="margin-bottom:8px;">We've sent a reset link to</p>
      <p style="font-weight:700;color:var(--gold);margin-bottom:20px;" id="sentEmail"></p>
      <p style="font-size:13px;color:var(--text3);margin-bottom:24px;">Didn't receive it? Check your spam folder or resend below.</p>
      <button onclick="resend()" class="btn-gold btn-full" style="margin-bottom:12px;">Resend Email</button>
      <a href="login.html" class="btn-ghost btn-full" style="text-align:center;padding:14px;">Back to Sign In</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAkq3f19TALpHQ89CoALb-4z18-Lz_Jndc",
    authDomain: "my-right-a4982.firebaseapp.com",
    projectId: "my-right-a4982",
    storageBucket: "my-right-a4982.firebasestorage.app",
    messagingSenderId: "522849413367",
    appId: "1:522849413367:web:ede20dd4876808da390bf2"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  let lastEmail = '';

  window.sendReset = async () => {
    const email = document.getElementById('email').value.trim();
    const btn = document.getElementById('resetBtn');
    if (!email) { showErr('Please enter your email address.'); return; }
    if (!email.includes('@')) { showErr('Please enter a valid email.'); return; }

    btn.disabled = true;
    btn.textContent = 'Sending...';

    try {
      await sendPasswordResetEmail(auth, email);
      lastEmail = email;
      document.getElementById('sentEmail').textContent = email;
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';
    } catch(e) {
      btn.disabled = false;
      btn.textContent = 'Send Reset Link →';
      const msgs = {
        'auth/user-not-found': 'No account found with this email.',
        'auth/invalid-email': 'Please enter a valid email address.',
        'auth/too-many-requests': 'Too many requests. Please wait and try again.'
      };
      showErr(msgs[e.code] || 'Failed to send. Please try again.');
    }
  };

  window.resend = async () => {
    if (!lastEmail) return;
    try {
      await sendPasswordResetEmail(auth, lastEmail);
      showToast('✅ Reset email sent again!');
    } catch(e) { showToast('❌ Failed to resend. Please wait a moment.'); }
  };

  document.getElementById('email').addEventListener('keypress', e => {
    if (e.key === 'Enter') window.sendReset();
  });

  function showErr(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 5000);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>

</body>
</html>
